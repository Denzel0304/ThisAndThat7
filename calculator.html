<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculator</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  touch-action:none;
  overscroll-behavior:none;
  background:#0f0f13;
  display:flex; align-items:center; justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  user-select:none; -webkit-user-select:none;
}

.wrap {
  width:100%; max-width:430px;
  height:100dvh;
  display:flex; flex-direction:column;
}

.display {
  flex:1; min-height:0;
  display:flex; flex-direction:column; justify-content:flex-end;
  padding:20px 24px 16px;
  position:relative; overflow:hidden;
}
.display::before {
  content:''; position:absolute; top:-60px; right:-60px;
  width:240px; height:240px;
  background:radial-gradient(circle,rgba(139,92,246,.22) 0%,transparent 70%);
  pointer-events:none;
}
.display::after {
  content:''; position:absolute; bottom:20px; left:-50px;
  width:180px; height:180px;
  background:radial-gradient(circle,rgba(6,182,212,.14) 0%,transparent 70%);
  pointer-events:none;
}
.mem-ind {
  font-size:13px; color:rgba(167,139,250,.75);
  text-align:right; min-height:18px;
  position:relative; z-index:1; letter-spacing:.05em;
}
.expr {
  font-size:19px; color:rgba(255,255,255,.36);
  text-align:right; min-height:28px;
  word-break:break-all; letter-spacing:.02em;
  position:relative; z-index:1; margin-top:2px;
}
.result {
  font-size:clamp(52px,13vw,76px); font-weight:300;
  color:#fff; text-align:right;
  letter-spacing:-.03em; line-height:1.05;
  word-break:break-all;
  position:relative; z-index:1; margin-top:2px;
  transition:transform .1s ease;
}
.result.pop { transform:scale(1.05); }

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:9px;
  padding:12px 14px 30px;
}

.btn {
  aspect-ratio:1;
  border:none; border-radius:50%;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden;
  outline:none; -webkit-appearance:none;
  transition:transform .08s ease;
  line-height:1;
}
.btn:active { transform:scale(0.89); }
.btn::after {
  content:''; position:absolute; inset:0; border-radius:50%;
  background:rgba(255,255,255,0); transition:background .1s;
}
.btn:active::after { background:rgba(255,255,255,.13); }

.btn-num {
  background:#1c1c26; color:#fff;
  font-size:clamp(24px,6.5vw,32px); font-weight:400;
}
.btn-zero {
  border-radius:40px; aspect-ratio:unset;
  justify-content:flex-start; padding-left:clamp(24px,7vw,32px);
  grid-column:span 2;
}
.btn-fn {
  background:#252532; color:#c0c3d4;
  font-size:clamp(16px,4.5vw,22px); font-weight:500;
}
.btn-mem {
  background:#162028; color:#67d8ef;
  font-size:clamp(13px,3.5vw,17px); font-weight:600;
  letter-spacing:.02em;
}
.btn-mem.mem-active {
  background:#1a3040; color:#22d3ee;
  box-shadow:0 0 12px rgba(34,211,238,.3);
}
.btn-op {
  background:linear-gradient(145deg,#7c3aed,#5b21b6);
  color:#fff;
  font-size:clamp(26px,7vw,34px); font-weight:300;
  box-shadow:0 4px 18px rgba(124,58,237,.38);
}
.btn-op.active-op {
  background:linear-gradient(145deg,#a78bfa,#7c3aed);
  box-shadow:0 4px 22px rgba(167,139,250,.55);
}
.btn-eq {
  background:linear-gradient(145deg,#06b6d4,#0e7490);
  color:#fff;
  font-size:clamp(26px,7vw,34px);
  box-shadow:0 4px 18px rgba(6,182,212,.38);
}
.btn-back {
  background:#2a1f2d; color:#f472b6;
  font-size:clamp(20px,5.5vw,26px); font-weight:400;
}

@media (max-height:680px) {
  .grid { gap:6px; padding:8px 10px 18px; }
  .result { font-size:46px; }
}
@media (min-width:430px) {
  .grid { gap:12px; padding:16px 18px 36px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="display">
    <div class="mem-ind" id="memInd"></div>
    <div class="expr"    id="expr"></div>
    <div class="result"  id="result">0</div>
  </div>

  <div class="grid" id="grid">
    <!-- Memory row -->
    <button class="btn btn-mem" data-action="mc">MC</button>
    <button class="btn btn-mem" data-action="mr">MR</button>
    <button class="btn btn-mem" data-action="mplus">M+</button>
    <button class="btn btn-mem" data-action="mminus">M−</button>

    <!-- Function row -->
    <button class="btn btn-fn"  data-action="clear">AC</button>
    <button class="btn btn-fn"  data-action="sign">+/-</button>
    <button class="btn btn-fn"  data-action="percent">%</button>
    <button class="btn btn-op"  data-action="op" data-op="÷">÷</button>

    <!-- Digit rows -->
    <button class="btn btn-num" data-action="num" data-num="7">7</button>
    <button class="btn btn-num" data-action="num" data-num="8">8</button>
    <button class="btn btn-num" data-action="num" data-num="9">9</button>
    <button class="btn btn-op"  data-action="op" data-op="×">×</button>

    <button class="btn btn-num" data-action="num" data-num="4">4</button>
    <button class="btn btn-num" data-action="num" data-num="5">5</button>
    <button class="btn btn-num" data-action="num" data-num="6">6</button>
    <button class="btn btn-op"  data-action="op" data-op="−">−</button>

    <button class="btn btn-num" data-action="num" data-num="1">1</button>
    <button class="btn btn-num" data-action="num" data-num="2">2</button>
    <button class="btn btn-num" data-action="num" data-num="3">3</button>
    <button class="btn btn-op"  data-action="op" data-op="+">+</button>

    <!-- Bottom row: 0(×2) · ⌫ = -->
    <button class="btn btn-num btn-zero" data-action="num" data-num="0">0</button>
    <button class="btn btn-num" data-action="decimal">.</button>
    <button class="btn btn-back" data-action="back">⌫</button>
    <button class="btn btn-eq"  data-action="equals">=</button>
  </div>
</div>

<script>
  let current = '0', prev = '', operator = '', justCalc = false;
  let memory = 0, memHasValue = false;

  const resEl  = document.getElementById('result');
  const exprEl = document.getElementById('expr');
  const memEl  = document.getElementById('memInd');

  function fmt(n) {
    if (!isFinite(n)) return 'Error';
    let s = parseFloat(n.toPrecision(12)).toString();
    if (s.includes('e')) return n.toExponential(4);
    let [int, dec] = s.split('.');
    int = int.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return dec !== undefined ? int + '.' + dec : int;
  }

  function display(v) {
    const n = parseFloat(v);
    resEl.textContent = isNaN(n) ? (v || '0') : fmt(n);
  }

  function pop() {
    resEl.classList.remove('pop');
    void resEl.offsetWidth;
    resEl.classList.add('pop');
    setTimeout(() => resEl.classList.remove('pop'), 110);
  }

  function updateMemInd() {
    memEl.textContent = memHasValue ? 'M  ' + fmt(memory) : '';
    document.querySelectorAll('.btn-mem').forEach(b =>
      b.classList.toggle('mem-active', memHasValue));
  }

  function compute(a, op, b) {
    a = parseFloat(a); b = parseFloat(b);
    if (op === '÷') return b === 0 ? NaN : a / b;
    if (op === '×') return a * b;
    if (op === '−') return a - b;
    if (op === '+') return a + b;
    return b;
  }

  /* iOS-style %:
     78 × 0.3 %  →  78 × (0.3/100)       = 0.234
     100 + 10 %  →  100 + (100×10/100)   = 110   */
  function applyPercent() {
    const cur = parseFloat(current);
    let result;
    if ((operator === '+' || operator === '−') && prev !== '') {
      result = parseFloat(prev) * cur / 100;
    } else {
      result = cur / 100;
    }
    current = result.toString();
    display(current);
  }

  function setActiveOp(op) {
    document.querySelectorAll('.btn-op').forEach(b =>
      b.classList.toggle('active-op', b.dataset.op === op));
  }
  function clearActiveOp() {
    document.querySelectorAll('.btn-op').forEach(b =>
      b.classList.remove('active-op'));
  }

  document.getElementById('grid').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;

    if (action === 'clear') {
      current = '0'; prev = ''; operator = ''; justCalc = false;
      clearActiveOp(); exprEl.textContent = ''; display('0');
    }

    else if (action === 'back') {
      if (justCalc) { current = '0'; display('0'); return; }
      current = current.length <= 1 || (current.length === 2 && current[0] === '-')
        ? '0' : current.slice(0, -1);
      display(current);
    }

    else if (action === 'sign') {
      if (current !== '0') {
        current = (parseFloat(current) * -1).toString();
        display(current);
      }
    }

    else if (action === 'percent') { applyPercent(); }

    else if (action === 'num') {
      const d = btn.dataset.num;
      if (justCalc) { current = d; justCalc = false; clearActiveOp(); }
      else current = current === '0' ? d : current.length >= 14 ? current : current + d;
      display(current);
    }

    else if (action === 'decimal') {
      if (justCalc) { current = '0.'; justCalc = false; clearActiveOp(); }
      else if (!current.includes('.')) current += '.';
      display(current);
    }

    else if (action === 'op') {
      const op = btn.dataset.op;
      if (operator && !justCalc) {
        const res = compute(prev, operator, current);
        if (!isFinite(res)) {
          current = 'Error'; display('Error'); exprEl.textContent = '';
          operator = ''; prev = ''; return;
        }
        prev = res.toString(); current = res.toString(); display(current);
      } else {
        prev = current;
      }
      operator = op; justCalc = false;
      exprEl.textContent = fmt(parseFloat(prev)) + ' ' + op;
      setActiveOp(op);
    }

    else if (action === 'equals') {
      if (!operator) return;
      const res = compute(prev, operator, current);
      exprEl.textContent = fmt(parseFloat(prev)) + ' ' + operator + ' ' + fmt(parseFloat(current)) + ' =';
      if (!isFinite(res)) {
        current = 'Error'; display('Error'); operator = ''; return;
      }
      current = res.toString(); prev = ''; operator = ''; justCalc = true;
      display(current); clearActiveOp(); pop();
    }

    else if (action === 'mc')     { memory = 0; memHasValue = false; updateMemInd(); }
    else if (action === 'mr')     { if (memHasValue) { current = memory.toString(); justCalc = false; display(current); } }
    else if (action === 'mplus')  { memory = (memHasValue ? memory : 0) + parseFloat(current); memHasValue = true; updateMemInd(); }
    else if (action === 'mminus') { memory = (memHasValue ? memory : 0) - parseFloat(current); memHasValue = true; updateMemInd(); }
  });

  document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
</script>
</body>
</html>
